name="screenly-rss-reader"
main="src/index.tsx"
compatibility_date = "2022-07-18"
workers_dev = true

[site]
bucket = "./assets"
# The client TypeScript source (main.ts + render.ts) lives in the assets tree
# but must not be served — only the bundled main.js (built by build.ts) is.
exclude = ["**/*.ts"]

[dev]
port = 8888

[env.dev]
workers_dev = true

[env.stage]
workers_dev = false
route = { pattern = "stage-rss.srly.io", custom_domain = true }

[env.stage.vars]
ENV = "stage"

# Workers observability: invocation logs on, full console logs off.
[env.stage.observability.logs]
enabled = false
invocation_logs = true

[env.production]
workers_dev = false
route = { pattern = "rss.srly.io", custom_domain = true }

[env.production.vars]
ENV = "production"

[env.production.observability.logs]
enabled = false
invocation_logs = true
