name="screenly-rss-reader"
main="src/index.tsx"
compatibility_date = "2022-07-18"
workers_dev = true

[site]
bucket = "./assets"
# The client TypeScript source (main.ts + render.ts) lives in the assets tree
# but must not be served — only the bundled main.js (built by build.ts) is.
exclude = ["**/*.ts"]

# Cloudflare Images binding — per-Worker, used by the signed /img route to resize
# images server-side. This does NOT expose the public /cdn-cgi/image endpoint.
# Not inherited by environments, so it is repeated under each [env.*] below; this
# top-level one applies to plain `wrangler dev`.
[images]
binding = "IMAGES"

[dev]
port = 8888

# Workers observability — top level, inherited by all environments (stage/prod).
[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1

[env.dev]
workers_dev = true

[env.dev.images]
binding = "IMAGES"

[env.stage]
workers_dev = false
route = { pattern = "stage-rss.srly.io", custom_domain = true }

[env.stage.vars]
ENV = "stage"

[env.stage.images]
binding = "IMAGES"

[env.production]
workers_dev = false
route = { pattern = "rss.srly.io", custom_domain = true }

[env.production.vars]
ENV = "production"

[env.production.images]
binding = "IMAGES"
